<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="100%" height="100%">
  <defs>
    <style>
      /* Background */
      .bg {
        fill: #161618;
      }

      /* Typography */
      .title {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-weight: 700;
        font-size: 36px;
        fill: #FFFFFF;
        opacity: 0;
        animation: fadeUp 0.8s ease-out 1s forwards;
      }

      /* Bubbles and Animations */
      .azure-group {
        animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards, floatAzure 4s ease-in-out infinite alternate;
        transform-origin: 385px 185px;
        opacity: 0;
      }
      
      .buhler-group {
        animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.6s forwards, floatBuhler 4s ease-in-out infinite alternate-reverse;
        transform-origin: 215px 240px;
        opacity: 0;
      }

      .dot {
        fill: #FFFFFF;
        animation: blink 1.5s infinite;
      }
      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      /* Keyframes */
      @keyframes popIn {
        0% { transform: scale(0.5) translateY(20px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }

      @keyframes floatAzure {
        0% { transform: translateY(0px) rotate(0deg); }
        100% { transform: translateY(-8px) rotate(1deg); }
      }

      @keyframes floatBuhler {
        0% { transform: translateY(0px) rotate(0deg); }
        100% { transform: translateY(-8px) rotate(-1deg); }
      }

      @keyframes blink {
        0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-3px); }
      }

      @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>

    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <linearGradient id="azureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4" />
      <stop offset="100%" stop-color="#005A9E" />
    </linearGradient>

    <linearGradient id="buhlerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C26D" />
      <stop offset="100%" stop-color="#009652" />
    </linearGradient>
  </defs>

  <rect class="bg" width="100%" height="100%" rx="16" />

  <g transform="translate(0, -30)">
    
    <g class="azure-group">
      <path fill="url(#azureGrad)" filter="url(#shadow)" d="M320,100 h120 a35,35 0 0,1 35,35 v60 a35,35 0 0,1 -35,35 h-20 l-30,30 v-30 h-70 a35,35 0 0,1 -35,-35 v-60 a35,35 0 0,1 35,-35 z" />
      <rect x="325" y="140" width="80" height="8" rx="4" fill="#FFFFFF" opacity="0.8"/>
      <rect x="325" y="165" width="50" height="8" rx="4" fill="#FFFFFF" opacity="0.6"/>
    </g>

    <g class="buhler-group">
      <path fill="url(#buhlerGrad)" filter="url(#shadow)" d="M140,150 h140 a35,35 0 0,1 35,35 v70 a35,35 0 0,1 -35,35 h-70 l-40,35 v-35 h-30 a35,35 0 0,1 -35,-35 v-70 a35,35 0 0,1 35,-35 z" />
      
      <g transform="translate(0, 5)">
        <circle class="dot" cx="180" cy="215" r="7" />
        <circle class="dot" cx="210" cy="215" r="7" />
        <circle class="dot" cx="240" cy="215" r="7" />
      </g>
    </g>

  </g>

  <text class="title" x="300" y="375" text-anchor="middle">Bühler Chat</text>

</svg>
